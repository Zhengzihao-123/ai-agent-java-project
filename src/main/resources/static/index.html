<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课岗证赛一体化智能体</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h1>课岗证赛一体化智能体</h1>
            <p>欢迎使用智能学习助手</p>
            
            <div class="error-message" id="authError"></div>
            <div class="success-message" id="authSuccess"></div>

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="btnRegister">注册</button>
                <button class="btn btn-primary" id="btnLogin">登录</button>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div class="header-left">
                <h2>智能助手</h2>
                <span class="agent-badge" id="currentAgent">课程智能体</span>
            </div>
            <button class="btn-logout" id="btnLogout">退出登录</button>
        </div>

        <div class="chat-main">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>聊天历史</h3>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-item active" data-agent="course">
                        <div>
                            <div class="history-title">新对话</div>
                            <div class="history-role">课程智能体</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messagesContainer">
                    <div class="message ai">
                        <div class="avatar ai">AI</div>
                        <div class="message-content">
                            <div class="message-text">您好！我是您的智能学习助手。请问有什么可以帮助您的？</div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-container">
                        <select class="agent-selector" id="agentSelector">
                            <option value="course">课程智能体</option>
                            <option value="training">培训智能体</option>
                            <option value="cert">考证智能体</option>
                            <option value="competition">竞赛智能体</option>
                        </select>
                        <div class="input-wrapper">
                            <textarea class="message-input" id="messageInput" placeholder="输入您的问题..." rows="1"></textarea>
                        </div>
                        <button class="btn-send" id="btnSend" disabled>
                            <span>→</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
